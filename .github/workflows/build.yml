name: Build & Release APK
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.41.6'
jobs:
  build:
    name: Build Release APK (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
      # ── Java ──────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      # ── Flutter ───────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      # ── Dependencies ──────────────────────────────────────────
      - name: Get dependencies
        run: flutter pub get
      # ── Decode Keystore ───────────────────────────────────────
      # Required GitHub secrets:
      #   KEYSTORE_BASE64   – base64 of your .jks keystore file
      #   KEYSTORE_PASSWORD – keystore password
      #   KEY_ALIAS         – key alias
      #   KEY_PASSWORD      – key password
      #   TELEGRAM_API_ID   – Telegram API ID (from my.telegram.org/apps)
      #   TELEGRAM_API_HASH – Telegram API hash
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=${{ github.workspace }}/android/app/release-keystore.jks
          EOF
      # ── Analyze ───────────────────────────────────────────────
      - name: Run static analysis
        run: flutter analyze --no-fatal-infos
      # ── Tests ─────────────────────────────────────────────────
      - name: Run unit & widget tests
        run: flutter test
      # ── Build APK (arm64-v8a only, split) ──────────────────────
      # Size optimizations:
      #   --target-platform android-arm64   → arm64 AOT only (no x86/arm32)
      #   --split-per-abi                   → one APK per ABI
      # NOTE: --obfuscate is intentionally excluded — it triggers Google Play
      # Protect "scan before install" warnings on sideloaded APKs because
      # obfuscated code is indistinguishable from malware patterns to Play Protect.
      - name: Build release APK (arm64 only)
        run: >
          flutter build apk
          --release
          --target-platform android-arm64
          --split-per-abi
          --dart-define=TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
          --dart-define=TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
      # ── Show APK size for tracking ─────────────────────────────
      - name: Report APK size
        run: |
          APK=$(find build/app/outputs/flutter-apk -name "*arm64*.apk" | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "### APK Size: $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "Path: $APK" >> $GITHUB_STEP_SUMMARY
          ls -lh build/app/outputs/flutter-apk/
      # ── Upload Artifact ───────────────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-arm64-apk
          path: build/app/outputs/flutter-apk/*arm64*.apk
          retention-days: 30
          if-no-files-found: error
      # ── (Optional) Create GitHub Release on version tags ──────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*arm64*.apk
          generate_release_notes: true
  build-windows:
    name: Build Release Windows (${{ matrix.arch.name }})
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: x64
            flutter_target: windows-x64
            tdlib_package: win32-x64
            build_dir: x64
          - name: x86
            flutter_target: windows-x86
            tdlib_package: win32-ia32
            build_dir: x86
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Enable Windows Desktop Support
        run: flutter config --enable-windows-desktop
      - name: Get dependencies
        run: flutter pub get
      - name: Setup Node for tdjson.dll
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup tdjson.dll from npm prebuilt-tdlib
        run: |
          npm init -y
          npm install @prebuilt-tdlib/${{ matrix.arch.tdlib_package }}@0.1008050.0 --force
          New-Item -ItemType Directory -Force -Path "build\windows\${{ matrix.arch.build_dir }}\runner\Release\"
          Copy-Item "node_modules\@prebuilt-tdlib\${{ matrix.arch.tdlib_package }}\tdjson.dll" -Destination "build\windows\${{ matrix.arch.build_dir }}\runner\Release\"
      - name: Build Windows release
        run: >
          flutter build windows --release
          --target-platform=${{ matrix.arch.flutter_target }}
          --dart-define=TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
          --dart-define=TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
      - name: Compress Windows Build
        run: Compress-Archive -Path build\windows\${{ matrix.arch.build_dir }}\runner\Release\* -DestinationPath tesseract-windows-${{ matrix.arch.name }}.zip
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-windows-${{ matrix.arch.name }}
          path: tesseract-windows-${{ matrix.arch.name }}.zip
          retention-days: 30
          if-no-files-found: error
      - name: Create GitHub Release for Windows
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tesseract-windows-${{ matrix.arch.name }}.zip
          generate_release_notes: true
