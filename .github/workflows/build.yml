name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.41.6'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # ── Flutter ───────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Verify Flutter installation
        run: flutter doctor -v

      # ── Dependencies ──────────────────────────────────────────
      - name: Get dependencies
        run: flutter pub get

      # ── Decode Keystore ───────────────────────────────────────
      # Required GitHub secrets:
      #   KEYSTORE_BASE64   – base64 of your .jks keystore file
      #   KEYSTORE_PASSWORD – keystore password
      #   KEY_ALIAS         – key alias
      #   KEY_PASSWORD      – key password
      #   TELEGRAM_API_ID   – Telegram API ID (from my.telegram.org/apps)
      #   TELEGRAM_API_HASH – Telegram API hash
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=${{ github.workspace }}/android/app/release-keystore.jks
          EOF

      # ── Analyze ───────────────────────────────────────────────
      - name: Run static analysis
        run: flutter analyze --no-fatal-infos

      # ── Tests ─────────────────────────────────────────────────
      - name: Run unit & widget tests
        run: flutter test

      # ── Build APK ─────────────────────────────────────────────
      - name: Build release APK
        run: >
          flutter build apk --release --no-tree-shake-icons
          --dart-define=TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
          --dart-define=TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}

      # ── Upload Artifact ───────────────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: telegram-downloader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error

      # ── (Optional) Create GitHub Release ──────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
