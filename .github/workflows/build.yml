name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.41.6'

jobs:
  build:
    name: Build Release APK (arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # ── Flutter ───────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ── Dependencies ──────────────────────────────────────────
      - name: Get dependencies
        run: flutter pub get

      # ── Decode Keystore ───────────────────────────────────────
      # Required GitHub secrets:
      #   KEYSTORE_BASE64   – base64 of your .jks keystore file
      #   KEYSTORE_PASSWORD – keystore password
      #   KEY_ALIAS         – key alias
      #   KEY_PASSWORD      – key password
      #   TELEGRAM_API_ID   – Telegram API ID (from my.telegram.org/apps)
      #   TELEGRAM_API_HASH – Telegram API hash
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=${{ github.workspace }}/android/app/release-keystore.jks
          EOF

      # ── Analyze ───────────────────────────────────────────────
      - name: Run static analysis
        run: flutter analyze --no-fatal-infos

      # ── Tests ─────────────────────────────────────────────────
      - name: Run unit & widget tests
        run: flutter test

      # ── Build APK (arm64-v8a only, split) ──────────────────────
      # Size optimizations:
      #   --target-platform android-arm64   → arm64 AOT only (no x86/arm32)
      #   --split-per-abi                   → one APK per ABI
      # NOTE: --obfuscate is intentionally excluded — it triggers Google Play
      # Protect "scan before install" warnings on sideloaded APKs because
      # obfuscated code is indistinguishable from malware patterns to Play Protect.
      - name: Build release APK (arm64 only)
        run: >
          flutter build apk
          --release
          --target-platform android-arm64
          --split-per-abi
          --dart-define=TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
          --dart-define=TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}

      # ── Show APK size for tracking ─────────────────────────────
      - name: Report APK size
        run: |
          APK=$(find build/app/outputs/flutter-apk -name "*arm64*.apk" | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "### APK Size: $SIZE" >> $GITHUB_STEP_SUMMARY
          echo "Path: $APK" >> $GITHUB_STEP_SUMMARY
          ls -lh build/app/outputs/flutter-apk/

      # ── Upload Artifact ───────────────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-arm64-apk
          path: build/app/outputs/flutter-apk/*arm64*.apk
          retention-days: 30
          if-no-files-found: error

      # ── (Optional) Create GitHub Release on version tags ──────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*arm64*.apk
          generate_release_notes: true

  build-windows:
    name: Build Release Windows (x64)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Windows Desktop Support
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      # Optional: Depending on the tdlib dart package implementation, you may need to download
      # tdjson.dll and place it next to the compiled executable. We add a placeholder here.
      # - name: Setup tdjson.dll
      #   run: |
      #     Invoke-WebRequest -Uri "https://github.com/tdlib/td/releases/download/.../tdlib.zip" -OutFile tdlib.zip
      #     Expand-Archive tdlib.zip -DestinationPath tdlib
      #     Copy-Item tdlib/tdjson.dll build/windows/x64/runner/Release/

      - name: Build Windows release
        run: >
          flutter build windows --release
          --dart-define=TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
          --dart-define=TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}

      - name: Compress Windows Build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath tesseract-windows-x64.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-windows-x64
          path: tesseract-windows-x64.zip
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release for Windows
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tesseract-windows-x64.zip
          generate_release_notes: true
